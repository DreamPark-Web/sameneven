<svg width="100%" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="amberFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C49A" stop-opacity="0.3"/>
